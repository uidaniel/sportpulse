# Render Blueprint — deploys the always-on services.
# (The Next.js dashboard is best deployed on Vercel; see DEPLOY notes.)
#
# The gateway holds the WhatsApp socket, and the scraper polls on a schedule.
# For X_SOURCE=custom, the scraper worker calls the Next.js web server's
# internal /api/twitter route (set CUSTOM_SCRAPER_URL accordingly).
services:
  # WhatsApp gateway — Baileys sockets + HTTP control API (dashboard calls this).
  - type: web
    name: sportpulse-gateway
    runtime: node
    rootDir: services/whatsapp-gateway
    plan: starter
    buildCommand: npm install --include=dev
    startCommand: npm run start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: WA_PRINT_QR_TERMINAL
        value: "false"
      # public, safe to commit:
      - key: SUPABASE_URL
        value: https://upfjegitipgsrovminhw.supabase.co
      # secrets — set these in the Render dashboard (Environment tab):
      - key: GATEWAY_API_TOKEN
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false

  # X scraper — cron polling + fan-out to the wa-send queue. No inbound HTTP.
  - type: worker
    name: sportpulse-scraper
    runtime: node
    rootDir: services/scraper
    plan: starter
    buildCommand: npm install --include=dev
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        value: https://upfjegitipgsrovminhw.supabase.co
      - key: X_SOURCE
        value: custom
      - key: CUSTOM_SCRAPER_URL
        sync: false
      - key: CUSTOM_SCRAPER_TOKEN
        sync: false
      # secrets — set in the Render dashboard:
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
